name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  source-release:
    name: Validate and publish source release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release source and version
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: release tags must use vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "error: release commit is not contained in origin/main" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          if [[ "$VERSION" != "$BUNDLE_VERSION" ]]; then
            echo "error: tag version $VERSION does not match bundle version $BUNDLE_VERSION" >&2
            exit 1
          fi
          if ! grep -Fq "## $VERSION -" CHANGELOG.md; then
            echo "error: CHANGELOG.md has no dated section for $VERSION" >&2
            exit 1
          fi

      - name: Lint and test release source
        run: |
          ./scripts/lint.sh
          ./scripts/test.sh

      - name: Publish source beta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          This is a source-only beta for Apple Silicon Macs running macOS 14 or newer.

          Clone this tag and follow the [local setup instructions](https://github.com/${GITHUB_REPOSITORY}#run-locally). Vani builds and runs entirely on your Mac. GitHub automatically provides the source archives below.

          A prebuilt app is intentionally not attached: Gatekeeper-trusted public binaries require paid Apple Developer ID signing and notarization. See the [changelog](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md) for included changes.
          EOF
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --prerelease --title "Vani $VERSION source beta" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --prerelease --title "Vani $VERSION source beta" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

  signed-release:
    name: Sign, notarize, and attach macOS app
    if: vars.APPLE_DISTRIBUTION_ENABLED == 'true'
    needs: source-release
    runs-on: macos-15
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release credentials
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
        run: |
          test -n "$CERTIFICATE_P12"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_APP_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
        run: |
          umask 077
          printf '%s' "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/vani.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/vani.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/vani.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/vani.keychain-db"
          security import "$RUNNER_TEMP/vani.p12" -k "$RUNNER_TEMP/vani.keychain-db" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/vani.keychain-db"
          security list-keychains -d user -s "$RUNNER_TEMP/vani.keychain-db"
          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$RUNNER_TEMP/vani.keychain-db" | awk '/Developer ID Application/ && !found {print $2; found=1}')"
          test -n "$SIGNING_IDENTITY"
          echo "CODESIGN_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build and sign
        env:
          CODESIGN_TIMESTAMP: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" ./scripts/build-app.sh

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist/Vani.app "$RUNNER_TEMP/Vani-notarization.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Vani-notarization.zip" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple dist/Vani.app
          xcrun stapler validate dist/Vani.app
          spctl --assess --type execute --verbose=2 dist/Vani.app

      - name: Package release
        run: |
          ditto -c -k --keepParent dist/Vani.app Vani-macOS-arm64.zip
          shasum -a 256 Vani-macOS-arm64.zip > Vani-macOS-arm64.zip.sha256

      - name: Attest release artifact
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: Vani-macOS-arm64.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" Vani-macOS-arm64.zip Vani-macOS-arm64.zip.sha256 --clobber
            gh release edit "$GITHUB_REF_NAME" --prerelease=false --title "Vani ${GITHUB_REF_NAME#v}"
          else
            gh release create "$GITHUB_REF_NAME" Vani-macOS-arm64.zip Vani-macOS-arm64.zip.sha256 --verify-tag --generate-notes
          fi

      - name: Remove signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/vani.keychain-db" >/dev/null 2>&1 || true
          rm -f "$RUNNER_TEMP/vani.p12"
